            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    Locale:
      type: string
      maxLength: 10
      enum: [en, da, de, es, fi, fr, hu, it, nb, nl, pl, pt, sv, tr, cs, ru, el, et, id, ja, ko, ms, pt-br, sl, uk]
      description: "Locale short code. First 16 supported by HyperFormula + bl-excel. Last 9 (el–uk) supported by bl-excel only — fall back to enUS on HyperFormula."

    DataGrid:
      type: array
      items:
        type: array
        items: {}
      description: 2D array of cell values

    SheetsObject:
      type: object
      minProperties: 1
      additionalProperties:
        type: array
        items:
          type: array
          items: {}
      description: Named sheets — string keys mapped to 2D arrays

    SheetFormula:
      type: object
      required: [cell, formula]
      properties:
        cell:
          type: string
          pattern: ^[A-Za-z]+[0-9]+$
          description: "Cell reference (e.g. C1, AA10)"
        formula:
          type: string
          minLength: 1
        sheet:
          type: string
          description: Target sheet name. Defaults to first sheet if omitted.

    NamedExpression:
      type: object
      required: [name, expression]
      properties:
        name:
          type: string
          description: Named range/expression name
        expression:
          type: string
          description: "Formula expression (e.g. =Sheet1!$A$1:$C$10)"
        scope:
          type: string
          description: Sheet name for sheet-scoped expressions (omit for global)

    FormulaResult:
      type: object
      required: [result, formula, format, cached]
      properties:
        result:
          description: Scalar value or 2D array for spill formulas
        formula:
          type: string
        format:
          type: string
          enum: [scalar, array]
        cached:
          type: boolean

    BatchResultItem:
      oneOf:
        - type: object
          required: [result, formula, format, cached]
          properties:
            result: {}
            formula:
              type: string
            format:
              type: string
              enum: [scalar, array]
            cached:
              type: boolean
        - type: object
          required: [error, type, formula]
          properties:
            error:
              type: string
            type:
              type: string
              description: "Excel error type (NAME, VALUE, REF, etc.)"
            formula:
              type: string
            unresolvedFunctions:
              type: array
              items:
                type: string
              description: "Unresolved function names extracted from formula (present on NAME errors only)"

    InputSchema:
      type: object
      required: [type, properties]
      properties:
        type:
          type: string
          const: object
        required:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties:
            type: object
            description: |
              JSON Schema property with mapping extensions:
              `mapping` — cell reference (e.g. `'Sheet1'!A1`),
              `default` — default value,
              `transform` — preprocess value before cell injection (`date`, `time`, `datetime`, `percentage`),
              `oneOf` — dropdown options (UI metadata only, not enforced server-side).
      description: |
        JSON Schema (draft-07) with mapping extensions for input fields.

        **Transforms** preprocess user-facing values into Excel-native values before cell injection:
        - `date` — ISO date string (`YYYY-MM-DD`) → Excel serial number. E.g. `"2025-02-27"` → `45715`
        - `time` — time string (`HH:MM` or `HH:MM:SS`) → fractional day (0–1). E.g. `"12:30:00"` → `0.520833`
        - `datetime` — ISO datetime (`YYYY-MM-DDTHH:MM:SS`) → serial + fraction. E.g. `"2025-02-27T12:30:00"` → `45715.520833`
        - `percentage` — number ÷ 100. E.g. `15` → `0.15`
      example:
        type: object
        required: [start_date]
        properties:
          start_date: { type: string, transform: date, mapping: "'S'!A1" }
          start_time: { type: string, transform: time, mapping: "'S'!B1", default: "09:00" }
          event_at: { type: string, transform: datetime, mapping: "'S'!C1" }
          tax_rate: { type: number, transform: percentage, mapping: "'S'!D1", default: 0, minimum: 0, maximum: 100 }

    OutputSchema:
      type: object
      required: [type, properties]
      properties:
        type:
          type: string
          const: object
        properties:
          type: object
          additionalProperties:
            type: object
            description: |
              JSON Schema property with mapping extensions:
              `mapping` — cell or range reference (e.g. `'Sheet1'!C1`, `'Budget'!A1:B10`),
              `mapping_item` — column letter for array items,
              `transform` — convert Excel-native value to user-friendly format (`date`, `time`, `datetime`, `percentage`).
      description: |
        JSON Schema (draft-07) with mapping extensions for output fields.

        **Output transforms** convert Excel-native values back to user-friendly formats after calculation:
        - `date` — Excel serial number → ISO date string (`YYYY-MM-DD`). E.g. `45715` → `"2025-02-27"`
        - `time` — fractional day (0–1) → time string (`HH:MM:SS`). E.g. `0.520833` → `"12:30:00"`
        - `datetime` — serial + fraction → ISO datetime (`YYYY-MM-DDTHH:MM:SS`). E.g. `45715.520833` → `"2025-02-27T12:30:00"`
        - `percentage` — decimal × 100. E.g. `0.15` → `15`

    CalculatorMeta:
      type: object
      required: [calculatorId, ttl, name, version, hasToken, input, output]
      properties:
        calculatorId:
          type: string
        ttl:
          type: integer
          description: TTL in seconds
        expiresAt:
          type: string
          format: date-time
        name:
          type: ["string", "null"]
          description: Human-readable calculator name
        version:
          type: ["string", "null"]
          description: Calculator version string
        hasToken:
          type: boolean
          description: Whether a token is set (token value never exposed)
        accountId:
          type: ["string", "null"]
          description: Account ID for rate limiting
        allowedIps:
          type: ["array", "null"]
          items:
            type: string
          description: IP/CIDR allowlist (null = allow all). Patchable.
        allowedOrigins:
          type: ["array", "null"]
          items:
            type: string
          description: Origin allowlist (null = allow all). Patchable.
        locale:
          type: string
          description: Present when set
        description:
          type: string
          description: Calculator description (omitted when null)
        test:
          type: boolean
          description: Present when set
        integration:
          type: ["object", "null"]
          description: Integration type flags. Requires mcp.enabled.
          properties:
            skill:
              type: boolean
              description: Expose as Claude Code skill
            plugin:
              type: boolean
              description: Expose as Cowork plugin
        mcp:
          $ref: "#/components/schemas/McpConfig"
        profile:
          $ref: "#/components/schemas/MeasuredProfile"
        unresolvedFunctions:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: Unresolved function name
              references:
                type: array
                items:
                  type: string
                description: Cell references containing the unresolved function
          description: "Functions the engine couldn't resolve during creation (bl-excel only, omitted when empty)"
        input:
          $ref: "#/components/schemas/InputSchema"
        output:
          $ref: "#/components/schemas/OutputSchema"

    McpConfig:
      type: object
      description: MCP (Model Context Protocol) configuration. When enabled, exposes calculator as an MCP tool.
      properties:
        enabled:
          type: boolean
          description: Whether MCP endpoint is active for this calculator
        toolName:
          type: string
          description: MCP tool name (required when enabled)
        toolDescription:
          type: ["string", "null"]
          description: MCP tool description shown to AI clients
        responseTemplate:
          type: ["string", "null"]
          description: "Markdown template with {{param}} placeholders for input/output. Included in tools/call response for LLM formatting."

    McpConnectionConfig:
      type: object
      description: MCP connection configuration for AI clients
      properties:
        enabled:
          type: boolean
        endpoint:
          type: string
          description: MCP endpoint path
        toolName:
          type: string
        toolDescription:
          type: ["string", "null"]
        responseTemplate:
          type: ["string", "null"]
        auth:
          type: object
          properties:
            type:
              type: string
              const: header
            name:
              type: string
              const: X-Auth-Token
        claudeDesktop:
          type: object
          description: Claude Desktop configuration snippet
          additionalProperties: true

    CalculatorDescribe:
      type: object
      required: [name, version, expected_input, expected_output]
      description: |
        Self-describing calculator metadata for UI generation.
        `expected_input` and `expected_output` are clean schemas — internal fields
        (`mapping`, `transform`, `mapping_item`) are stripped. `oneOf` is preserved.
      properties:
        name:
          type: ["string", "null"]
          description: Human-readable calculator name
        version:
          type: ["string", "null"]
          description: Calculator version string
        description:
          type: string
          description: Calculator description (omitted when null)
        expected_input:
          type: object
          description: Clean input schema (no mapping/transform fields)
        expected_output:
          type: object
          description: Clean output schema (no mapping/transform fields)

    HealthResponse:
      type: object
      required: [status, ts]
      description: Lightweight health check response.
      properties:
        status:
          type: string
          const: ok
        ts:
          type: integer
          description: Unix timestamp (ms)

    ServerStatsResponse:
      type: object
      required: [status, ts, instanceId, cluster, instances]
      description: Cluster-wide server stats aggregated from Redis.
      properties:
        status:
          type: string
          const: ok
        ts:
          type: integer
          description: Unix timestamp (ms)
        instanceId:
          type: string
          description: Current instance identifier
        cluster:
          type: object
          description: Aggregated metrics across all instances.
          properties:
            instances:
              type: integer
            totalWorkers:
              type: integer
            totalQueuePending:
              type: integer
            totalQueueMax:
              type: integer
            totalCalculators:
              type: integer
            totalHeapUsedMB:
              type: number
        instances:
          type: object
          description: Per-instance snapshots keyed by instance ID.
          additionalProperties:
            $ref: "#/components/schemas/InstanceSnapshot"

    InstanceSnapshot:
      type: object
      description: Single instance health snapshot.
      properties:
        live:
          type: boolean
          description: True if this is the responding instance (fresh data), false if from Redis cache.
        instanceId:
          type: string
        ts:
          type: integer
        cache:
          type: object
        queue:
          type: object
          properties:
            pending:
              type: integer
            max:
              type: integer
        calculators:
          type: object
          properties:
            size:
              type: integer
            max:
              type: integer
        stats:
          type: object
          properties:
            buffered:
              type: integer
            totalFlushed:
              type: integer
            totalDropped:
              type: integer
        poolSize:
          type: integer
        workers:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              calculators:
                type: integer
              calculatorIds:
                type: array
                items:
                  type: string
              heapUsedMB:
                type: number
        capacity:
          type: object
          properties:
            totalWorkers:
              type: integer
            totalHeapUsedMB:
              type: number
            totalCalculatorDataMB:
              type: number

    Remark:
      type: object
      required: [level, code, message]
      properties:
        level:
          type: string
          enum: [info, warning, error]
        code:
          type: string
          description: "Machine-readable code (e.g. HIGH_FORMULA_COUNT, VOLATILE_FORMULAS)"
        message:
          type: string

    StaticProfile:
      type: object
      description: Static analysis profile computed from sheets + formulas (no engine needed)
      properties:
        sheetCount:
          type: integer
        totalCells:
          type: integer
        formulaCount:
          type: integer
        expressionCount:
          type: integer
        crossSheetRefs:
          type: integer
        volatileCount:
          type: integer
        dataBytes:
          type: integer
          description: JSON-serialized size of sheets + formulas in bytes
        estimatedMemoryMB:
          type: integer
          description: Estimated worker heap usage in MB
        estimatedBuildMs:
          type: integer
          description: Estimated engine build time in ms
        estimatedExecMs:
          type: number
          description: Estimated single execution time in ms
        functionsUsed:
          type: array
          items:
            type: string
          description: Deduplicated list of Excel functions found in formulas
        remarks:
          type: array
          items:
            $ref: "#/components/schemas/Remark"

    MeasuredProfile:
      type: object
      description: Full profile with static analysis + measured build metrics. When ENGINE=bl-excel, estimates are replaced with actual Rust measurements.
      allOf:
        - $ref: "#/components/schemas/StaticProfile"
        - type: object
          properties:
            buildMs:
              type: integer
              description: Actual engine build time in ms
            heapDeltaMB:
              type: number
              description: Worker heap/RSS increase during build in MB
            rustMemoryMB:
              type: number
              description: Rust allocator memory for this calculator in MB (bl-excel only, 2 decimal precision)
            rustMemoryBytes:
              type: integer
              description: Rust allocator memory for this calculator in bytes (bl-excel only)
            cycleCount:
              type: integer
              description: Number of circular references resolved

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
      example:
        error: Calculator not found

    HealthErrorResponse:
      type: object
      required: [status, error]
      properties:
        status:
          type: string
          const: error
        error:
          type: string
      example:
        status: error
        error: Calculator not found

    OutputError:
      type: object
      required: [error, code, fields]
      properties:
        error:
          type: string
          example: Calculation produced errors
        code:
          type: string
          enum: [OUTPUT_ERROR]
        fields:
          type: array
          items:
            type: object
            required: [field, error]
            properties:
              field:
                type: string
                description: "Dot-notation path to the error field (e.g. 'total', 'items[0].amount')"
              error:
                type: object
                properties:
                  type:
                    type: string
                    description: "Excel error type (NA, VALUE, REF, DIV_BY_ZERO, NUM, NAME, etc.)"
                  message:
                    type: string
                  value:
                    type: string
                  unresolvedFunctions:
                    type: array
                    items:
                      type: string
                    description: "Function names the engine couldn't resolve (present on NAME errors, bl-excel only)"

    ErrorWithDetail:
      type: object
      required: [error]
      properties:
        error:
          type: string
        detail:
          type: string
      example:
        error: Validation error
        detail: "body/formula must NOT have fewer than 1 characters"

    FormulaError:
      type: object
      required: [error, type, formula]
      properties:
        error:
          type: string
        type:
          type: string
          description: "Excel error type (NAME, VALUE, REF, DIV/0, NUM, N/A, NULL)"
        formula:
          type: string
        unresolvedFunctions:
          type: array
          items:
            type: string
          description: "Unresolved function names extracted from formula (present on NAME errors only)"
      example:
        error: Formula error
        type: NAME
        formula: "NOTAFUNCTION(1)"
        unresolvedFunctions: ["NOTAFUNCTION"]

    FunctionCatalogResponse:
      type: object
      required: [count, functions]
      properties:
        count:
          type: integer
          description: Number of functions returned
        functions:
          type: array
          items:
            $ref: "#/components/schemas/FunctionDoc"

    FunctionDoc:
      type: object
      required: [name, category, description, syntax, args, variadic, returns, returnsArray, volatile]
      properties:
        name:
          type: string
          description: Function name (uppercase)
        category:
          type: string
          description: Function category
        description:
          type: string
          description: Brief description of what the function does
        syntax:
          type: string
          description: Function syntax with argument placeholders
        args:
          type: array
          items:
            $ref: "#/components/schemas/FunctionArg"
        variadic:
          type: boolean
          description: Whether the function accepts a variable number of arguments
        example:
          type: string
          description: Example formula
        exampleDescription:
          type: string
          description: What the example returns
        returns:
          type: string
          description: Return type (number, string, boolean, array, any)
        returnsArray:
          type: boolean
          description: Whether the function can return an array
        volatile:
          type: boolean
          description: Whether the function is volatile (recalculates on every change)
      example:
        name: SUM
        category: math
        description: Adds all the numbers in a range of cells
        syntax: "SUM(number1, [number2], ...)"
        args:
          - name: number1
            type: number
            required: true
            description: The first number or range to add
          - name: number2
            type: number
            required: false
            description: Additional numbers or ranges
            repeating: true
        variadic: true
        example: "SUM(1,2,3)"
        exampleDescription: Returns 6
        returns: number
        returnsArray: false
        volatile: false

    FunctionArg:
      type: object
      required: [name, type, required, description]
      properties:
        name:
          type: string
          description: Argument name
        type:
          type: string
          description: Expected type (number, string, boolean, any, range)
        required:
          type: boolean
          description: Whether the argument is required
        description:
          type: string
          description: Brief description of the argument
        default:
          type: string
          description: Default value if omitted
        repeating:
          type: boolean
          description: Whether this argument can be repeated (variadic tail)

  securitySchemes:
    AdminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: Global admin token for management endpoints (calculators CRUD, list, parse). Set via ADMIN_TOKEN env var.
    FormulaToken:
      type: apiKey
      in: header
      name: X-Auth-Token
      description: Formula auth token for stateless /execute endpoints. Validated against Admin API or FORMULA_TEST_TOKEN env var.
    CalculatorToken:
      type: apiKey
      in: header
      name: X-Auth-Token
      description: Per-calculator token set at creation time. Required for execute and describe endpoints.

  responses:
    AdminUnauthorized:
      description: Admin access not configured or missing X-Admin-Token header
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AdminForbidden:
      description: Invalid admin token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing X-Auth-Token header
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Invalid auth token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Validation error (bad request body)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorWithDetail"

    FormulaError:
      description: Formula evaluation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FormulaError"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Gone:
      description: Resource expired or lost (calculator gone — client must recreate)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ServiceBusy:
      description: Service overloaded — retry after delay
      headers:
        Retry-After:
          schema:
            type: string
            example: "5"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorWithDetail"
