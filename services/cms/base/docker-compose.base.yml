# =============================================================================
# Directus Base Services
# =============================================================================
# Supporting services for local Directus development.
# Include this in your project's docker-compose.yml
#
# Usage in project:
#   include:
#     - path: base/docker-compose.base.yml
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database (with pgvector for embeddings)
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus -d directus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MailDev (local email testing)
  # ---------------------------------------------------------------------------
  maildev:
    image: maildev/maildev
    restart: unless-stopped
    ports:
      - "2080:1080"   # Web UI - view emails at http://localhost:2080
      - "2025:1025"   # SMTP

volumes:
  pgdata:
  redisdata:
