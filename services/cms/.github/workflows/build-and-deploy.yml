# =============================================================================
# Businesslogic CMS Directus - Build and Deploy Pipeline
# =============================================================================
# This workflow builds the Docker image and pushes to DigitalOcean Container
# Registry (DOCR).
#
# Versioning: CalVer format YYYY.MM.DD (e.g., 2024.12.03)
# - Dev branch: :dev + :VERSION.RUN-dev tags (e.g., 2024.12.03.35-dev)
# - Main branch: :latest + :VERSION.RUN tags (e.g., 2024.12.03.35) + GitHub Release
#
# Required GitHub Secrets:
#   - NPM_TOKEN: npm token for private @coignite packages
#   - DIGITALOCEAN_ACCESS_TOKEN: DO API token with read/write access to DOCR
#   - DIRECTUS_SUBMODULE_SSH_KEY: SSH deploy key for coignite-directus-base (org secret)
# =============================================================================

name: Build and Deploy

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: coignite-dockers/bsl-cms-directus  # TODO: Change this

jobs:
  # ---------------------------------------------------------------------------
  # Build Docker Image
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    outputs:
      project_version: ${{ steps.version.outputs.project_version }}
      version_tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Setup SSH for submodules
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DIRECTUS_SUBMODULE_SSH_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set version info
        id: version
        run: |
          PROJECT_VERSION=$(date +%Y.%m.%d)
          DIRECTUS_VERSION=$(cat DIRECTUS_VERSION)
          echo "project_version=$PROJECT_VERSION" >> $GITHUB_OUTPUT
          echo "directus_version=$DIRECTUS_VERSION" >> $GITHUB_OUTPUT

          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            # Dev: VERSION.RUN-dev (e.g., 2024.12.03.35-dev)
            TAG="${PROJECT_VERSION}.${{ github.run_number }}-dev"
          else
            # Main: VERSION.RUN (e.g., 2024.12.03.35)
            TAG="${PROJECT_VERSION}.${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Project: $PROJECT_VERSION, Directus: $DIRECTUS_VERSION, Tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # PR number (for PRs only)
            type=ref,event=pr
            # Version tag (dev or release)
            type=raw,value=${{ steps.version.outputs.tag }}
            # Latest tag for main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Dev tag for dev branch
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./base/Dockerfile
          build-args: |
            DIRECTUS_VERSION=${{ steps.version.outputs.directus_version }}
            PROJECT_VERSION=${{ steps.version.outputs.project_version }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            npm_token=${{ secrets.NPM_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image info
        if: github.event_name != 'pull_request'
        run: |
          echo "Image pushed successfully!"
          echo ""
          echo "Project: ${{ steps.version.outputs.project_version }}"
          echo "Tag: ${{ steps.version.outputs.tag }}"
          echo ""
          echo "Docker tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'
          echo ""
          echo "To use in App Platform, set image to:"
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          fi

  # ---------------------------------------------------------------------------
  # Create GitHub Release (main branch only)
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Setup SSH for submodules
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DIRECTUS_SUBMODULE_SSH_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version_tag }}
          name: Release ${{ needs.build.outputs.version_tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
