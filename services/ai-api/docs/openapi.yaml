openapi: 3.1.0
info:
  title: BusinessLogic AI API
  description: AI chat, knowledge base search/ingest, embeddings, and MCP endpoint.
  version: 0.2.0
  license:
    name: GPL-3.0
    identifier: GPL-3.0-only

servers:
  - url: http://localhost:3200
    description: Local development
  - url: https://api.businesslogic.online/ai
    description: Production (via gateway)

security:
  - apiKey: []
  - adminToken: []

paths:
  # ─── Health ──────────────────────────────────────────────
  /ping:
    get:
      operationId: ping
      summary: Liveness check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok

  /health:
    get:
      operationId: health
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ─── Chat ────────────────────────────────────────────────
  /v1/ai/chat:
    post:
      operationId: chatStream
      summary: AI chat (SSE streaming)
      description: |
        Streams AI responses via Server-Sent Events. Supports multi-turn
        conversations with tool execution (calculators, KB search, flows).
        Returns usage headers: X-AI-Cost, X-AI-Tokens-Input, X-AI-Tokens-Output.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream
          headers:
            X-AI-Cost:
              schema: { type: string }
              description: Cost in USD
            X-AI-Tokens-Input:
              schema: { type: string }
              description: Input tokens used
            X-AI-Tokens-Output:
              schema: { type: string }
              description: Output tokens used
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Events: text_delta, tool_use_start, tool_executing,
                  tool_result, conversation_created, done, error
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/ai/chat/sync:
    post:
      operationId: chatSync
      summary: AI chat (synchronous)
      description: |
        Non-streaming chat. Returns full response after completion.
        Same capabilities as streaming but waits for full response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Complete chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSyncResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ─── Conversations ───────────────────────────────────────
  /v1/ai/conversations:
    get:
      operationId: listConversations
      summary: List conversations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConversationSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createConversation
      summary: Create conversation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Conversation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/ai/conversations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      operationId: getConversation
      summary: Get conversation
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Conversation"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateConversation
      summary: Update conversation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                status: { type: string, enum: [active, archived] }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Conversation"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: archiveConversation
      summary: Archive conversation
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      status: { type: string, const: archived }
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Usage & Models ──────────────────────────────────────
  /v1/ai/usage:
    get:
      operationId: getUsage
      summary: Monthly token usage
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UsageStats"

  /v1/ai/models:
    get:
      operationId: getModels
      summary: Available AI models
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      default: { type: string }
                      allowed:
                        type: array
                        items: { type: string }

  /v1/ai/prompts:
    get:
      operationId: getPrompts
      summary: Published system prompts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Prompt"

  # ─── Knowledge Base CRUD ─────────────────────────────────
  /v1/ai/kb/list:
    get:
      operationId: listKnowledgeBases
      summary: List knowledge bases
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeBase"

  /v1/ai/kb/create:
    post:
      operationId: createKnowledgeBase
      summary: Create knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                icon: { type: string }
                sort: { type: integer }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/KnowledgeBase"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/ai/kb/{kbId}:
    parameters:
      - $ref: "#/components/parameters/kbId"

    get:
      operationId: getKnowledgeBase
      summary: Get knowledge base with stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/KnowledgeBase"
                      - type: object
                        properties:
                          document_count: { type: integer }
                          chunk_count: { type: integer }
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateKnowledgeBase
      summary: Update knowledge base
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                icon: { type: string }
                sort: { type: integer }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/KnowledgeBase"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteKnowledgeBase
      summary: Delete knowledge base (cascade)
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      deleted: { type: boolean, const: true }
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── KB Documents ────────────────────────────────────────
  /v1/ai/kb/{kbId}/documents:
    parameters:
      - $ref: "#/components/parameters/kbId"
    get:
      operationId: listDocuments
      summary: List KB documents
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Document"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/ai/kb/{kbId}/upload:
    parameters:
      - $ref: "#/components/parameters/kbId"
    post:
      operationId: uploadDocument
      summary: Upload document for ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_id]
              properties:
                file_id: { type: string }
                title: { type: string }
      responses:
        "200":
          description: Enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Document"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/ai/kb/{kbId}/documents/{docId}:
    parameters:
      - $ref: "#/components/parameters/kbId"
      - name: docId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      operationId: deleteDocument
      summary: Delete document + chunks
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      deleted: { type: boolean, const: true }
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/ai/kb/{kbId}/reindex/{docId}:
    parameters:
      - $ref: "#/components/parameters/kbId"
      - name: docId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: reindexDocument
      summary: Re-index document
      responses:
        "200":
          description: Re-index queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      status: { type: string, const: pending }
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── KB Search & Ask ─────────────────────────────────────
  /v1/ai/kb/search:
    post:
      operationId: kbSearch
      summary: Hybrid KB search (BM25 + vector)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SearchResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/ai/kb/ask:
    post:
      operationId: kbAsk
      summary: Search + LLM answer generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: Generated answer with sources
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/ai/kb/ingest/{jobId}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getIngestStatus
      summary: Get ingestion job status
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/IngestJob"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── KB Curated Answers ──────────────────────────────────
  /v1/ai/kb/{kbId}/curated:
    parameters:
      - $ref: "#/components/parameters/kbId"
    get:
      operationId: listCuratedAnswers
      summary: List curated Q&A pairs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CuratedAnswer"
    post:
      operationId: createCuratedAnswer
      summary: Create curated Q&A (auto-embeds question)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question, answer]
              properties:
                question: { type: string }
                answer: { type: string }
                metadata: { type: object }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CuratedAnswer"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/ai/kb/{kbId}/curated/{answerId}:
    parameters:
      - $ref: "#/components/parameters/kbId"
      - name: answerId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateCuratedAnswer
      summary: Update curated Q&A (re-embeds if question changed)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                question: { type: string }
                answer: { type: string }
                metadata: { type: object }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CuratedAnswer"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCuratedAnswer
      summary: Delete curated answer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      deleted: { type: boolean, const: true }
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── KB Feedback ─────────────────────────────────────────
  /v1/ai/kb/feedback:
    post:
      operationId: submitFeedback
      summary: Submit answer rating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                query: { type: string }
                answer: { type: string }
                rating: { type: string, enum: [up, down] }
                kb_id: { type: string, format: uuid }
                metadata: { type: object }
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      rating: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/ai/kb/{kbId}/feedback/stats:
    parameters:
      - $ref: "#/components/parameters/kbId"
    get:
      operationId: feedbackStats
      summary: Feedback statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      upvotes: { type: integer }
                      downvotes: { type: integer }
                      total: { type: integer }

  /v1/ai/kb/{kbId}/feedback/suggestions:
    parameters:
      - $ref: "#/components/parameters/kbId"
    get:
      operationId: feedbackSuggestions
      summary: Top downvoted queries (for curated answers)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        query: { type: string }
                        answer: { type: string }
                        downvote_count: { type: integer }
                        last_seen: { type: string, format: date-time }

  # ─── Embeddings ──────────────────────────────────────────
  /v1/ai/embeddings:
    post:
      operationId: createEmbeddings
      summary: Generate text embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input:
                  oneOf:
                    - type: string
                    - type: array
                      items: { type: string }
                model:
                  type: string
                  default: text-embedding-3-small
      responses:
        "200":
          description: Embeddings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        index: { type: integer }
                        embedding:
                          type: array
                          items: { type: number }
                  model: { type: string }
                  usage:
                    type: object
                    properties:
                      total_tokens: { type: integer }
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ─── MCP ─────────────────────────────────────────────────
  /v1/ai/mcp/{kbId}:
    parameters:
      - $ref: "#/components/parameters/kbId"
    post:
      operationId: mcpKb
      summary: MCP endpoint for knowledge base (JSON-RPC 2.0)
      description: |
        Exposes KB search and ask as MCP tools via JSON-RPC 2.0.
        Methods: initialize, ping, tools/list, tools/call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
      responses:
        "200":
          description: JSON-RPC response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
        "202":
          description: Notification acknowledged (no body)

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Public API key (validated by gateway, forwarded as X-Account-ID)
    adminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: Internal service-to-service token

  parameters:
    kbId:
      name: kbId
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Rate limit or quota exceeded
      headers:
        Retry-After:
          schema: { type: string }
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: Dependent service not configured
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              message: { type: string }

    HealthResponse:
      type: object
      required: [status, ts, service, version]
      properties:
        status: { type: string }
        ts: { type: integer }
        service: { type: string }
        version: { type: string }
        instanceId: { type: string }

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: User message text
        conversation_id:
          type: string
          format: uuid
          description: Continue existing conversation
        prompt_id:
          type: string
          format: uuid
          description: Use a published system prompt
        model:
          type: string
          description: Override model (must be in account's allowlist)

    ChatSyncResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            conversation_id: { type: string }
            response: { type: string }
            tool_calls:
              type: array
              items:
                type: object
                properties:
                  name: { type: string }
                  input: { type: object }
                  result: {}
                  is_error: { type: boolean }
            usage:
              type: object
              properties:
                input_tokens: { type: integer }
                output_tokens: { type: integer }
                model: { type: string }
                cost_usd: { type: number }

    ConversationSummary:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        status: { type: string }
        model: { type: string }
        total_input_tokens: { type: integer }
        total_output_tokens: { type: integer }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }

    Conversation:
      allOf:
        - $ref: "#/components/schemas/ConversationSummary"
        - type: object
          properties:
            messages:
              type: array
              items: { type: object }

    UsageStats:
      type: object
      properties:
        queries_used: { type: integer }
        tokens_used:
          type: object
          properties:
            input: { type: integer }
            output: { type: integer }
        cost_usd: { type: number }
        period_start: { type: string, format: date-time }

    Prompt:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        icon: { type: string }
        user_prompt_template: { type: string }
        category: { type: string }

    KnowledgeBase:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        icon: { type: string }
        sort: { type: integer }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }

    Document:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        file_id: { type: string }
        status: { type: string, enum: [pending, processing, ready, error] }
        chunk_count: { type: integer }
        token_count: { type: integer }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }

    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        kb_id:
          type: string
          format: uuid
          description: Scope to specific KB (optional)
        limit:
          type: integer
          default: 10

    SearchResult:
      type: object
      properties:
        id: { type: string }
        content: { type: string }
        similarity: { type: number }
        knowledge_base_id: { type: string }
        knowledge_base_name: { type: string }
        metadata: { type: object }

    AskRequest:
      type: object
      required: [question]
      properties:
        question: { type: string }
        kb_id: { type: string, format: uuid }
        model: { type: string }
        limit: { type: integer, default: 10 }

    AskResponse:
      type: object
      properties:
        answer: { type: string }
        confidence: { type: number }
        source_refs:
          type: array
          items: { type: integer }
        sources:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              id: { type: string }
              content: { type: string }
              similarity: { type: number }
              knowledge_base_id: { type: string }
              knowledge_base_name: { type: string }
              metadata: { type: object }

    IngestJob:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [waiting, active, completed, failed] }
        progress: { type: number }
        data:
          type: object
          properties:
            documentId: { type: string }
            kbId: { type: string }
        result: { type: object }
        failedReason: { type: string }

    CuratedAnswer:
      type: object
      properties:
        id: { type: string, format: uuid }
        question: { type: string }
        answer: { type: string }
        metadata: { type: object }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }

    JsonRpcRequest:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"
        method:
          type: string
          enum: [initialize, ping, tools/list, tools/call]
        params:
          type: object

    JsonRpcResponse:
      type: object
      required: [jsonrpc]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"
        result: {}
        error:
          type: object
          properties:
            code: { type: integer }
            message: { type: string }
            data: {}
