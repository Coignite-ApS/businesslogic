# OpenTelemetry Collector configuration for local development.
# Accepts OTLP gRPC (4317) and HTTP (4318), exports to debug logging.
# In production, replace the debug exporter with otlphttp pointed at Grafana Cloud.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  resource:
    attributes:
      - key: deployment.environment
        value: "local"
        action: upsert

exporters:
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

  # Uncomment for Grafana Cloud:
  # otlphttp/grafana:
  #   endpoint: "${GRAFANA_OTLP_ENDPOINT}"
  #   headers:
  #     Authorization: "Basic ${GRAFANA_OTLP_TOKEN}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
