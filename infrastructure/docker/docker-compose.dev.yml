##############################################################################
# BusinessLogic Platform — Local Development Stack
#
# Usage:
#   docker compose -f infrastructure/docker/docker-compose.dev.yml up -d
#
# Host ports are offset to avoid collisions with other local projects:
#   postgres   — PostgreSQL 16 + pgvector (host 15432 → container 5432)
#   redis      — Redis 7 (host 16379 → container 6379)
#   maildev    — Email testing UI (host 11080 → container 1080)
#   bl-cms     — Directus CMS back-office (host 18055 → container 8055)
#   bl-formula-api — Formula evaluation (host 13000 → container 3000)
#   bl-flow-trigger — Flow webhook listener (host 13100 → container 3100)
#   bl-flow-worker  — Flow DAG executor (no HTTP port)
#   bl-ai-api  — AI chat, KB, embeddings (host 13200 → container 3200) — Iteration 1
#   bl-gateway — API gateway (host 18080 → container 8080) — Iteration 2
#   otel-collector — OpenTelemetry Collector (host 14317/14318 → container 4317/4318)
#
# Legacy (for comparison testing):
##############################################################################

name: businesslogic

services:

  # ════════════════════════════════════════════════════
  # Data Layer
  # ════════════════════════════════════════════════════

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  maildev:
    image: maildev/maildev
    ports:
      - "11080:1080"    # Web UI
      - "11025:1025"    # SMTP

  # ════════════════════════════════════════════════════
  # OpenTelemetry Collector (traces, metrics, logs)
  # ════════════════════════════════════════════════════

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    ports:
      - "14317:4317"   # OTLP gRPC
      - "14318:4318"   # OTLP HTTP
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ════════════════════════════════════════════════════
  # bl-cms (Directus — Back-Office)
  # ════════════════════════════════════════════════════
  #
  # NOTE: Uses base/ submodule Dockerfile.
  # The build context is the cms/ directory (project root for Directus).
  # The Dockerfile path is relative to that context: base/Dockerfile
  #
  # For local dev with hot-reload, mount extensions as volumes.

  bl-cms:
    build:
      context: ../../services/cms
      dockerfile: base/Dockerfile
      args:
        DIRECTUS_VERSION: "11.16.1"
      secrets:
        - npm_token
    ports:
      - "18055:8055"
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/directus/config.local.yaml
      - PUBLIC_URL=http://localhost:18055
      - DB_CLIENT=pg
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=directus
      - DB_USER=directus
      - DB_PASSWORD=directus
      - REDIS_ENABLED=true
      - REDIS=redis://redis:6379
      - CACHE_ENABLED=true
      - CACHE_TTL=5m
      - EXTENSIONS_AUTO_RELOAD=true
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      # Gateway internal auth (CMS→gateway→services)
      - GATEWAY_URL=http://bl-gateway:8080
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-dev-internal-secret}
      # Public gateway URL for code snippets
      - GATEWAY_PUBLIC_URL=${GATEWAY_PUBLIC_URL:-http://localhost:18080}
      # Direct service URLs (for public URL exposure + legacy)
      - FORMULA_API_URL=http://bl-formula-api:3000
      - FORMULA_API_ADMIN_TOKEN=${FORMULA_API_ADMIN_TOKEN:-dev-formula-token}
      # AI proxy (routes through gateway /internal/ai/ when enabled)
      - AI_SERVICE_ENABLED=${AI_SERVICE_ENABLED:-false}
    volumes:
      # Override baked-in extension copies with local source for hot-reload
      - ../../services/cms/extensions/local/project-extension-calculators:/directus/extensions/project-extension-calculators
      - ../../services/cms/extensions/local/project-extension-calculator-api:/directus/extensions/project-extension-calculator-api
      - ../../services/cms/extensions/local/project-extension-stripe:/directus/extensions/project-extension-stripe
      - ../../services/cms/extensions/local/project-extension-account:/directus/extensions/project-extension-account
      - ../../services/cms/extensions/local/project-extension-account-api:/directus/extensions/project-extension-account-api
      - ../../services/cms/extensions/local/project-extension-admin:/directus/extensions/project-extension-admin
      - ../../services/cms/extensions/local/project-extension-flow-hooks:/directus/extensions/project-extension-flow-hooks
      - ../../services/cms/extensions/local/project-extension-flows:/directus/extensions/project-extension-flows
      - ../../services/cms/extensions/local/project-extension-formulas:/directus/extensions/project-extension-formulas
      - ../../services/cms/extensions/local/project-extension-ai-api:/directus/extensions/project-extension-ai-api
      - ../../services/cms/extensions/local/project-extension-ai-assistant:/directus/extensions/project-extension-ai-assistant
      - ../../services/cms/extensions/local/project-extension-knowledge-api:/directus/extensions/project-extension-knowledge-api
      - ../../services/cms/extensions/local/project-extension-knowledge:/directus/extensions/project-extension-knowledge
      - ../../services/cms/extensions/local/project-extension-widget-api:/directus/extensions/project-extension-widget-api
      - ../../services/cms/extensions/local/project-extension-feature-flags:/directus/extensions/project-extension-feature-flags
      - ../../services/cms/extensions/local/project-extension-layout-builder:/directus/extensions/project-extension-layout-builder
      - ../../services/cms/email-templates:/directus/email-templates:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8055/server/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ════════════════════════════════════════════════════
  # bl-formula-api (Formula Evaluation + Calculators)
  # ════════════════════════════════════════════════════

  bl-formula-api:
    build:
      context: ../../services/formula-api
      dockerfile: Dockerfile
      secrets:
        - npm_token
    ports:
      - "13000:3000"
    environment:
      - PORT=3000
      - POOL_SIZE=4
      - REQUEST_TIMEOUT_MS=30000
      - REDIS_URL=redis://redis:6379
      - ADMIN_TOKEN=${FORMULA_API_ADMIN_TOKEN:-dev-formula-token}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_ENABLED=true
      - FORMULA_TEST_TOKEN=${FORMULA_TEST_TOKEN:-}
      - TEST_ACCOUNT_ID=${TEST_ACCOUNT_ID:-}
      - ENGINE=${ENGINE:-hyperformula}
      - MAX_QUEUE_DEPTH=256
      - CACHE_MAX_MEMORY_ITEMS=10000
      - DATABASE_URL=postgresql://directus:directus@postgres:5432/directus
      - ADMIN_API_URL=${ADMIN_API_URL:-http://bl-cms:8055}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ════════════════════════════════════════════════════
  # bl-flow (Rust DAG Workflow Engine)
  # ════════════════════════════════════════════════════

  bl-flow-trigger:
    build:
      context: ../../services/flow
      dockerfile: docker/Dockerfile
      target: trigger
      secrets:
        - github_token
    ports:
      - "13100:3100"
    environment:
      - PORT=3100
      - DATABASE_URL=postgresql://directus:directus@postgres:5432/directus
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=info
      - ADMIN_TOKEN=${FLOW_TRIGGER_ADMIN_TOKEN:-dev-flow-token}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_ENABLED=true
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3100/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  bl-flow-worker:
    build:
      context: ../../services/flow
      dockerfile: docker/Dockerfile
      target: worker
      secrets:
        - github_token
    environment:
      - DATABASE_URL=postgresql://directus:directus@postgres:5432/directus
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=info
      - WORKER_CONCURRENCY=10
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_ENABLED=true
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ════════════════════════════════════════════════════
  # bl-ai-api (AI Chat, KB, Embeddings) — Iteration 1
  # ════════════════════════════════════════════════════

  bl-ai-api:
    build:
      context: ../../services/ai-api
      dockerfile: Dockerfile
    ports:
      - "${AI_API_HOST_PORT:-13200}:3200"
    environment:
      - PORT=3200
      - DATABASE_URL=postgresql://directus:directus@postgres:5432/directus
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_API_ADMIN_TOKEN=${AI_API_ADMIN_TOKEN}
      - FORMULA_API_URL=http://bl-formula-api:3000
      - FORMULA_API_ADMIN_TOKEN=${FORMULA_API_ADMIN_TOKEN}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
      - KB_EMBEDDING_MODEL=${KB_EMBEDDING_MODEL:-text-embedding-3-small}
      - KB_MIN_SIMILARITY=${KB_MIN_SIMILARITY:-0.2}
      - KB_RRF_K=${KB_RRF_K:-60}
      - LOG_LEVEL=${AI_API_LOG_LEVEL:-warn}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3200/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ════════════════════════════════════════════════════
  # bl-gateway (Go API Gateway) — Iteration 2
  # ════════════════════════════════════════════════════

  bl-gateway:
    build:
      context: ../../services/gateway
      dockerfile: Dockerfile
    ports:
      - "18080:8080"
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://directus:directus@postgres:5432/directus
      - AI_API_URL=http://bl-ai-api:3200
      - FORMULA_API_URL=http://bl-formula-api:3000
      - FLOW_TRIGGER_URL=http://bl-flow-trigger:3100
      - CMS_URL=http://bl-cms:8055
      - LOG_LEVEL=debug
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-dev-internal-secret}
      - GATEWAY_SHARED_SECRET=${GATEWAY_SHARED_SECRET:-dev-shared-secret}
      - FORMULA_API_ADMIN_TOKEN=${FORMULA_API_ADMIN_TOKEN:-dev-formula-token}
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4318
      - OTEL_ENABLED=true
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3

secrets:
  npm_token:
    environment: NPM_TOKEN
  github_token:
    environment: GITHUB_TOKEN

volumes:
  pg_data:
  redis_data:
