  # ════════════════════════════════════════════════════
  # Legacy CMS (for comparison testing)
  # ════════════════════════════════════════════════════
  # Only starts with: --profile legacy

  legacy-cms:
    profiles: ["legacy"]
    build:
      context: ../../legacy-implementation/businesslogic-cms
      dockerfile: base/Dockerfile
      args:
        DIRECTUS_VERSION: "11.16.1"
      secrets:
        - npm_token
    ports:
      - "18056:8055"
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/directus/config.local.yaml
      - PUBLIC_URL=http://localhost:18056
      - DB_CLIENT=pg
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=directus
      - DB_USER=directus
      - DB_PASSWORD=directus
      - REDIS_ENABLED=true
      - REDIS=redis://redis:6379
      - FORMULA_API_URL=http://bl-formula-api:3000
      - FORMULA_API_ADMIN_TOKEN=${FORMULA_API_ADMIN_TOKEN:-dev-formula-token}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

secrets:
  npm_token:
    environment: NPM_TOKEN
  github_token:
    environment: GITHUB_TOKEN

volumes:
  pg_data:
  redis_data:
